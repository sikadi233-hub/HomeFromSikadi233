# ========== 传送点 ==========
max-own-homes: 4
max-shared-homes: 3
share-timeout: 30
home-cooldown: 5

# 传送预热(秒)，0=关闭
home-warmup: 3

# ========== TPA ==========
tpa-timeout: 60

# ========== RTP ==========
rtp-cooldown: 300
rtp-min-radius: 500
rtp-max-radius: 3000

# ========== /back ==========
back-cooldown: 10

# ========== 消息颜色 ==========
# 可选: GREEN, GOLD, RED, YELLOW, AQUA, LIGHT_PURPLE, WHITE, GRAY, BLUE
msg-primary: GOLD
msg-success: GREEN
msg-error: RED
msg-info: GRAY

# ========== 进服欢迎 ==========
welcome-message: true

# ========== MySQL ==========
mysql:
  enabled: false
  host: localhost
  port: 3306
  database: minecraft
  username: root
  password: ""
  table-prefix: "hfs_"
